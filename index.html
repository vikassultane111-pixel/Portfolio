<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikas Sultane | Security Engineer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts: JetBrains Mono & Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: transparent; /* CRITICAL FIX: Make transparent so 3D shows */
            color: #e5e5e5;
            overflow-x: hidden;
            margin: 0;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Behind everything */
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); /* Fallback bg */
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .neon-text {
            text-shadow: 0 0 5px #10b981, 0 0 10px #10b981, 0 0 20px #10b981;
        }

        .glass-panel {
            background: rgba(10, 10, 10, 0.75); /* More transparency */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(52, 211, 153, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* 3D Tilt Effect Classes */
        .tilt-card {
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #10b981; 
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
            color: white;
        }
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(30px, 9999px, 10px, 0); }
            5% { clip: rect(80px, 9999px, 90px, 0); }
            10% { clip: rect(20px, 9999px, 60px, 0); }
            15% { clip: rect(50px, 9999px, 30px, 0); }
            100% { clip: rect(10px, 9999px, 80px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 80px, 0); }
            5% { clip: rect(50px, 9999px, 30px, 0); }
            10% { clip: rect(20px, 9999px, 60px, 0); }
            15% { clip: rect(80px, 9999px, 90px, 0); }
            100% { clip: rect(30px, 9999px, 10px, 0); }
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(16, 185, 129, 0.3);
            position: absolute;
            z-index: 10;
            animation: scan 3s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        
        /* Progress Bar */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #10b981;
            z-index: 100;
            width: 0%;
            transition: width 0.1s;
            box-shadow: 0 0 10px #10b981;
        }
    </style>
</head>
<body>
    <!-- 3D Canvas sits here fixed in background -->
    <div id="progress-bar"></div>
    <div id="canvas-container"></div>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Components ---

        // Scroll Progress Bar Logic
        const ScrollProgress = () => {
            const handleScroll = () => {
                const totalScroll = document.documentElement.scrollTop;
                const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scroll = `${totalScroll / windowHeight}`;
                const progressBar = document.getElementById('progress-bar');
                if (progressBar) {
                    progressBar.style.width = `${scroll * 100}%`;
                }
            }
            useEffect(() => {
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return null;
        };

        // 3D Background Component using Three.js
        const ThreeBackground = () => {
            useEffect(() => {
                const container = document.getElementById('canvas-container');
                if (!container) return;
                
                // Clear any existing canvas
                container.innerHTML = '';

                const scene = new THREE.Scene();
                // Add fog for depth
                scene.fog = new THREE.FogExp2(0x000000, 0.0025);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                container.appendChild(renderer.domElement);

                // --- 3D Objects ---

                // 1. Wireframe Globe (The Core)
                const geometry = new THREE.IcosahedronGeometry(10, 2);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x10b981, // Emerald
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                const sphere = new THREE.Mesh(geometry, material);
                scene.add(sphere);

                // 2. Inner Core
                const innerGeo = new THREE.IcosahedronGeometry(6, 1);
                const innerMat = new THREE.MeshBasicMaterial({
                    color: 0x064e3b, // Darker Green
                    wireframe: true,
                    transparent: true,
                    opacity: 0.5
                });
                const innerSphere = new THREE.Mesh(innerGeo, innerMat);
                scene.add(innerSphere);

                // 3. Particles (Cyber Dust)
                const particlesGeometry = new THREE.BufferGeometry();
                const particleCount = 1000;
                const posArray = new Float32Array(particleCount * 3);
                
                for(let i = 0; i < particleCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 120; // Spread out
                }
                
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.15,
                    color: 0x34d399,
                    transparent: true,
                    opacity: 0.7,
                });
                const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
                scene.add(particlesMesh);

                camera.position.z = 25;

                // Mouse Interaction
                let mouseX = 0;
                let mouseY = 0;
                const windowHalfX = window.innerWidth / 2;
                const windowHalfY = window.innerHeight / 2;

                const onDocumentMouseMove = (event) => {
                    mouseX = (event.clientX - windowHalfX) * 0.05;
                    mouseY = (event.clientY - windowHalfY) * 0.05;
                };
                document.addEventListener('mousemove', onDocumentMouseMove);

                // Animation Loop
                const animate = () => {
                    requestAnimationFrame(animate);

                    // Continuous Rotation
                    sphere.rotation.y += 0.002;
                    sphere.rotation.x -= 0.001;
                    
                    innerSphere.rotation.y -= 0.003;
                    innerSphere.rotation.x += 0.002;

                    particlesMesh.rotation.y = -mouseX * 0.0005; // React to mouse
                    particlesMesh.rotation.x = -mouseY * 0.0005;

                    // Camera gentle sway
                    camera.position.x += (mouseX - camera.position.x) * 0.01;
                    camera.position.y += (-mouseY - camera.position.y) * 0.01;
                    camera.lookAt(scene.position);

                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    document.removeEventListener('mousemove', onDocumentMouseMove);
                };
            }, []);

            return null; // Canvas is already in HTML body
        };

        const Navbar = () => {

            const links = [

                                    >
                                        <span className="text-emerald-600 mr-2">&lt;</span>
                                        {link.name}
                                        <span className="text-emerald-600 ml-2">/&gt;</span>
                                    </a>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const TiltCard = ({ children, className }) => {
            const cardRef = useRef(null);
            const handleMouseMove = (e) => {
                const card = cardRef.current;
                // Only apply tilt effect on non-touch devices (laptops/desktops)
                if (window.matchMedia("(hover: hover)").matches) {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -5;
                    const rotateY = ((x - centerX) / centerX) * 5;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                }
            };
            const handleMouseLeave = () => {
                if (cardRef.current) {
                    cardRef.current.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
                }
            };
            return (
                <div ref={cardRef} className={`tilt-card ${className}`} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave}>
                    {children}
                </div>
            );
        };

        // --- Live Realistic Terminal ---
        const LiveTerminal = () => {
            const [logs, setLogs] = useState([
                { text: "Booting Vikas_OS v4.0...", color: "text-emerald-500" },
                { text: "Mounting file systems... OK", color: "text-gray-400" },
                { text: "Loading Security Modules... OK", color: "text-gray-400" },
                { text: "System Status: ONLINE", color: "text-emerald-400" },
            ]);
            const terminalBodyRef = useRef(null);

            const commands = [
                { 
                    cmd: "whoami", 
                    output: [
                        "User: Vikas Sultane",
                        "Role: Security Engineer",
                        "Mission: Securing the Digital Frontier"
                    ] 
                },
                { 
                    cmd: "cat ~/career/about.txt", 
                    output: [
                        "B.Tech in E&TC Engineering",
                        "Expertise: Ethical Hacking, IoT, Network Defense",
                        "Current Status: Open for Opportunities"
                    ] 
                },
                { 
                    cmd: "ls -la ~/projects/", 
                    output: [
                        "drwx------  Microstrip_Antenna_Design",
                        "drwx------  Automated_Port_Scanner_Script",
                        "drwx------  Smart_IoT_Exhaust_System",
                        "drwx------  Bug_Bounty_Reports"
                    ] 
                },
                { 
                    cmd: "grep 'SKILL' ~/system/skills.log", 
                    output: [
                        "> VAPT / API Security / OWASP Top 10",
                        "> React / Python / Bash / C++",
                        "> Burp Suite / Nmap / Wireshark"
                    ]

            ];

            useEffect(() => {
                const addLog = (text, color = "text-gray-300") => {
                    setLogs(prev => [...prev.slice(-15), { text, color }]); // Keep last 15 lines
                };

                let timeout;
                const runSequence = async () => {
                    const randomCmd = commands[Math.floor(Math.random() * commands.length)];
                    
                    // Type the command
                    addLog(`root@vikas-sec:~# ${randomCmd.cmd}`, "text-emerald-400 font-bold");
                    
                    // Delay for "processing"
                    await new Promise(r => setTimeout(r, 600));

                    // Show output lines one by one
                    for (let line of randomCmd.output) {
                        addLog(line, "text-gray-400");
                        await new Promise(r => setTimeout(r, 300));
                    }
                    
                    // Next command delay
                    timeout = setTimeout(runSequence, 3500); 
                };

                timeout = setTimeout(runSequence, 1000);
                return () => clearTimeout(timeout);
            }, []);

            // Auto scroll ONLY the terminal div
            useEffect(() => {
                if (terminalBodyRef.current) {
                    terminalBodyRef.current.scrollTop = terminalBodyRef.current.scrollHeight;
                }
            }, [logs]);

            return (
                <div className="w-full max-w-3xl mx-auto mt-10 relative group px-2 sm:px-0">
                    {/* Glowing Border */}
                    <div className="absolute -inset-1 bg-gradient-to-r from-emerald-600 to-green-900 rounded-lg blur opacity-30 group-hover:opacity-70 transition duration-1000"></div>
                    
                    <TiltCard className="relative bg-[#0c0c0c] rounded-lg border border-gray-800 shadow-2xl overflow-hidden font-mono text-xs sm:text-sm">
                        {/* Title Bar */}
                        <div className="bg-[#1a1a1a] px-4 py-2 flex items-center justify-between border-b border-gray-800">
                            <div className="flex items-center gap-2">
                                <div className="w-2.5 h-2.5 md:w-3 md:h-3 rounded-full bg-red-500/80"></div>
                                <div className="w-2.5 h-2.5 md:w-3 md:h-3 rounded-full bg-yellow-500/80"></div>
                                <div className="w-2.5 h-2.5 md:w-3 md:h-3 rounded-full bg-green-500/80"></div>
                                <span className="ml-3 text-xs text-gray-500 hidden sm:inline">root@vikas-kali: /bin/zsh</span>
                                <span className="ml-3 text-xs text-gray-500 sm:hidden">terminal</span>
                            </div>
                            <div className="text-[10px] md:text-xs text-emerald-500/50">LIVE SESSION</div>
                        </div>

                        {/* Terminal Body */}
                        <div ref={terminalBodyRef} className="p-4 h-64 md:h-72 overflow-y-auto relative scrollbar-hide bg-black/90">
                            <div className="scan-line"></div>
                            {logs.map((log, i) => (
                                <div key={i} className={`${log.color} mb-1 break-words leading-tight`}>
                                    <span className="opacity-50 text-[10px] mr-2 text-gray-600 hidden sm:inline">
                                        {new Date().toLocaleTimeString('en-US', {hour12: false})}
                                    </span>
                                    {log.text}
                                </div>
                            ))}
                            <div className="flex items-center mt-2 animate-pulse">
                                <span className="text-emerald-500 mr-2">root@vikas-sec:~#</span>
                                <span className="w-2 h-4 bg-emerald-500"></span>
                            </div>
                        </div>
                        
                        {/* Status Footer */}
                        <div className="bg-[#111] px-4 py-1 flex justify-between text-[10px] text-gray-500 border-t border-gray-800 font-mono">
                            <span>CPU: {Math.floor(Math.random() * 20 + 10)}%</span>
                            <span className="hidden sm:inline">MEM: 8.4GB / 16GB</span>
                            <span className="text-emerald-500">ENCRYPTED</span>
                        </div>
                    </TiltCard>
                </div>
            );
        };

        const Hero = () => {
            return (
                <section id="home" className="min-h-screen flex flex-col justify-center items-center px-4 relative pt-24 pb-12">
                    <div className="text-center z-10 w-full max-w-4xl">
                        <div className="inline-block mb-4 px-4 py-1 rounded-full border border-emerald-500/30 bg-emerald-900/10 text-emerald-400 text-[10px] md:text-xs tracking-widest uppercase">
                            Open for Opportunities
                        </div>
                        {/* Glitch Effect on Name */}
                        <h1 className="glitch text-4xl sm:text-5xl md:text-8xl font-black text-white mb-4 tracking-tight font-['Orbitron'] leading-tight" data-text="VIKAS SULTANE">
                            VIKAS SULTANE
                        </h1>
                        <h2 className="text-lg sm:text-xl md:text-2xl text-emerald-500 font-mono mb-6 px-2">
                            &lt; Security Engineer | Web Dev | IoT /&gt;
                        </h2>
                        <p className="text-gray-400 max-w-2xl mx-auto mb-8 font-light leading-relaxed px-4 text-sm md:text-base text-justify md:text-center">
                            Able to design, automate, and secure both frontend & backend systems with a focus on modern web technologies, cybersecurity & network infrastructure.
                        </p>
                        
                        <div className="flex flex-col sm:flex-row justify-center gap-4 mb-10 w-full px-8">
                            <a href="https://www.linkedin.com/in/vikas-sultane-82244322b" target="_blank" className="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-black font-bold rounded flex justify-center items-center gap-2 transition-all hover:scale-105 shadow-[0_0_20px_rgba(16,185,129,0.4)] text-sm md:text-base">
                                <i className="fa-brands fa-linkedin"></i> Hire Me
                            </a>
                            <a href="vk1.html" target="_blank" className="px-8 py-3 border border-gray-600 hover:border-emerald-500 text-gray-300 hover:text-emerald-400 font-bold rounded transition-all hover:bg-emerald-900/10 text-center text-sm md:text-base">
                                <i className="fa-solid fa-file-pdf"></i> View Resume

                    </div>
                    <LiveTerminal />

        };

        const About = () => {
             return (
                <section id="about" className="py-16 md:py-20 px-4">
                    <div className="max-w-6xl mx-auto glass-panel rounded-2xl p-6 md:p-12 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-20">
                           <i className="fa-solid fa-shield-halved text-9xl text-emerald-500"></i>
                        </div>

                        <div className="grid md:grid-cols-2 gap-8 md:gap-12 items-center relative z-10">
                            <div className="space-y-6">
                                <div className="inline-block px-3 py-1 border border-emerald-500/50 rounded-full text-emerald-400 text-xs font-bold tracking-wide uppercase bg-emerald-900/10">
                                    01. Identity Verification
                                </div>
                                <h2 className="text-2xl md:text-4xl font-bold text-white">
                                    About <span className="text-emerald-500">Me</span>
                                </h2>
                                <p className="text-gray-300 leading-relaxed text-sm md:text-base text-justify">
                                    I'm <strong>Vikas Gopal Sultane</strong>, currently working as a <strong>Security Test Engineer</strong> at Vmedulife Software. A proud B.Tech graduate in Electronics & Telecommunication, I bridge the gap between hardware and software security.
                                </p>
                                <p className="text-gray-300 leading-relaxed text-sm md:text-base text-justify">
                                    My curiosity pushes me to explore <strong>Networking, IoT, and Cybersecurity</strong>. I focus on mastering <strong>Offensive Security</strong> techniques and <strong>Network Defense</strong> strategies. I actively participate in bug bounty programs to keep my skills sharp and secure the digital world.
                                </p>
                                <div className="flex gap-4 mt-2">
                                    <div className="bg-gray-800 px-4 py-2 rounded border border-gray-700 text-xs font-bold text-emerald-400 shadow-lg">
                                        <i className="fa-solid fa-user-secret mr-2"></i> Ethical Hacking
                                    </div>
                                    <div className="bg-gray-800 px-4 py-2 rounded border border-gray-700 text-xs font-bold text-blue-400 shadow-lg">
                                        <i className="fa-solid fa-shield-halved mr-2"></i> Network Defense
                                    </div>
                                </div>
                            </div>
                            
                            {/* Hacker Vibe Image Grid - Updated Images */}
                            <div className="grid grid-cols-2 gap-3 mt-6 md:mt-0">
                                <div className="relative group overflow-hidden rounded-lg border border-gray-800 aspect-square">
                                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=500" className="object-cover w-full h-full opacity-70 group-hover:opacity-100 group-hover:scale-110 transition-all duration-500" alt="Cybersecurity" />
                                    <div className="absolute bottom-0 left-0 bg-black/80 px-2 py-1 text-[10px] text-emerald-500 font-mono w-full">CYBERWARFARE</div>
