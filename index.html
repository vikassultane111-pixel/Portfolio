        /* Glitch Effect */
        .glitch {
            position: relative;
            color: white;
        }
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(30px, 9999px, 10px, 0); }
            5% { clip: rect(80px, 9999px, 90px, 0); }
            10% { clip: rect(20px, 9999px, 60px, 0); }
            15% { clip: rect(50px, 9999px, 30px, 0); }
            100% { clip: rect(10px, 9999px, 80px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 80px, 0); }
            5% { clip: rect(50px, 9999px, 30px, 0); }
            10% { clip: rect(20px, 9999px, 60px, 0); }
            15% { clip: rect(80px, 9999px, 90px, 0); }
            100% { clip: rect(30px, 9999px, 10px, 0); }

            z-index: 10;
            animation: scan 3s linear infinite;

        const ScrollProgress = () => {
            const handleScroll = () => {
                const totalScroll = document.documentElement.scrollTop;
                const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scroll = `${totalScroll / windowHeight}`;
                const progressBar = document.getElementById('progress-bar');
                if (progressBar) {
                    progressBar.style.width = `${scroll * 100}%`;
                }
            }
            useEffect(() => {
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return null;
        };

        const ThreeBackground = () => {
            useEffect(() => {
                const container = document.getElementById('canvas-container');
                if (!container) return;
                
                container.innerHTML = '';
                const scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, 0.0025);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                container.appendChild(renderer.domElement);

                const geometry = new THREE.IcosahedronGeometry(10, 2);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x10b981,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                const sphere = new THREE.Mesh(geometry, material);
                scene.add(sphere);

                const innerGeo = new THREE.IcosahedronGeometry(6, 1);
                const innerMat = new THREE.MeshBasicMaterial({
                    color: 0x064e3b,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.5
                });
                const innerSphere = new THREE.Mesh(innerGeo, innerMat);
                scene.add(innerSphere);

                const particlesGeometry = new THREE.BufferGeometry();
                const particleCount = 1000;
                const posArray = new Float32Array(particleCount * 3);
                
                for(let i = 0; i < particleCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 120;
                }
                
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.15,
                    color: 0x34d399,
                    transparent: true,
                    opacity: 0.7,
                });
                const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
                scene.add(particlesMesh);

                camera.position.z = 25;

                let mouseX = 0;
                let mouseY = 0;
                const windowHalfX = window.innerWidth / 2;
                const windowHalfY = window.innerHeight / 2;

                const onDocumentMouseMove = (event) => {
                    mouseX = (event.clientX - windowHalfX) * 0.05;
                    mouseY = (event.clientY - windowHalfY) * 0.05;
                };
                document.addEventListener('mousemove', onDocumentMouseMove);

                const animate = () => {
                    requestAnimationFrame(animate);

                    sphere.rotation.y += 0.002;
                    sphere.rotation.x -= 0.001;
                    
                    innerSphere.rotation.y -= 0.003;
                    innerSphere.rotation.x += 0.002;

                    particlesMesh.rotation.y = -mouseX * 0.0005;
                    particlesMesh.rotation.x = -mouseY * 0.0005;

                    camera.position.x += (mouseX - camera.position.x) * 0.01;
                    camera.position.y += (-mouseY - camera.position.y) * 0.01;
                    camera.lookAt(scene.position);

                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    document.removeEventListener('mousemove', onDocumentMouseMove);
                };
            }, []);

            return null;
        };

        const TiltCard = ({ children, className }) => {

                const card = cardRef.current;

                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -5;
                    const rotateY = ((x - centerX) / centerX) * 5;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;

                }
            };
